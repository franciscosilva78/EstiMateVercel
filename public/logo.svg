<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#bg)" />

  <!-- Left Card -->
  <g transform="translate(130, 270) rotate(-20) translate(-80, -120)">
    <rect x="0" y="0" width="160" height="240" rx="20" fill="url(#grad2)" opacity="0.8" filter="url(#glow)"/>
    <rect x="3" y="3" width="154" height="234" rx="17" fill="#020617" />
    <text x="80" y="145" font-family="sans-serif" font-weight="900" font-size="80" fill="url(#grad2)" text-anchor="middle">5</text>
  </g>

  <!-- Right Card -->
  <g transform="translate(382, 270) rotate(20) translate(-80, -120)">
    <rect x="0" y="0" width="160" height="240" rx="20" fill="url(#grad2)" opacity="0.8" filter="url(#glow)"/>
    <rect x="3" y="3" width="154" height="234" rx="17" fill="#020617" />
    <text x="80" y="145" font-family="sans-serif" font-weight="900" font-size="80" fill="url(#grad2)" text-anchor="middle">13</text>
  </g>

  <!-- Center Card -->
  <g transform="translate(256, 250) translate(-90, -130)">
    <rect x="0" y="0" width="180" height="260" rx="20" fill="url(#grad1)" filter="url(#glow)"/>
    <rect x="4" y="4" width="172" height="252" rx="16" fill="#020617" />
    <text x="90" y="155" font-family="sans-serif" font-weight="900" font-size="100" fill="url(#grad1)" text-anchor="middle">8</text>
  </g>
</svg>
